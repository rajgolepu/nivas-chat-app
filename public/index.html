<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nivas Chat</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a2e;
      --border: #2a2a3e; --text: #e4e4e7; --text2: #8888a0;
      --accent: #6c5ce7; --accent2: #a29bfe; --green: #00cec9;
      --red: #ff4757; --msg-me: #2d1b69; --msg-other: #1e1e2e;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      height: 100dvh; height: 100vh;
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; backdrop-filter: blur(10px);
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 32px 28px; width: 90%; max-width: 360px;
      text-align: center; animation: popIn 0.3s ease;
    }
    @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal h2 { font-size: 22px; margin-bottom: 6px; background: linear-gradient(135deg, var(--accent2), var(--green)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .modal p { color: var(--text2); font-size: 14px; margin-bottom: 20px; }
    .modal input { width: 100%; padding: 14px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 16px; outline: none; margin-bottom: 16px; }
    .modal input:focus { border-color: var(--accent); }
    .modal button { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), #8b5cf6); border: none; border-radius: 12px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; }
    .modal button:active { transform: scale(0.97); }

    /* Header */
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .header-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent), var(--green)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .header-info h1 { font-size: 17px; font-weight: 700; }
    .header-info span { font-size: 12px; color: var(--green); display: flex; align-items: center; gap: 4px; }
    .header-info span::before { content: ''; width: 6px; height: 6px; background: var(--green); border-radius: 50%; }
    .header-actions { margin-left: auto; display: flex; gap: 8px; }
    .header-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; color: var(--text); font-size: 18px; cursor: pointer; transition: background 0.2s; }
    .header-btn:hover { background: var(--border); }

    /* Users bar */
    .users-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; gap: 8px; overflow-x: auto; flex-shrink: 0; }
    .user-pill { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--accent2); white-space: nowrap; }

    /* Messages */
    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .msg { max-width: 80%; padding: 10px 14px; border-radius: 16px; animation: fadeUp 0.25s ease; word-wrap: break-word; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .msg.me { align-self: flex-end; background: var(--msg-me); border-bottom-right-radius: 4px; }
    .msg.other { align-self: flex-start; background: var(--msg-other); border-bottom-left-radius: 4px; }
    .msg .username { font-size: 11px; font-weight: 600; color: var(--accent2); margin-bottom: 3px; }
    .msg.me .username { color: var(--green); }
    .msg .text { font-size: 15px; line-height: 1.4; }
    .msg .time { font-size: 10px; color: var(--text2); margin-top: 4px; text-align: right; }
    .msg.other .time { text-align: left; }
    .typing-indicator { font-size: 13px; color: var(--text2); padding: 4px 16px; min-height: 24px; font-style: italic; }
    .system-msg { text-align: center; font-size: 12px; color: var(--text2); padding: 8px; background: var(--surface2); border-radius: 20px; align-self: center; max-width: 80%; }

    /* Input */
    .input-area { background: var(--surface); border-top: 1px solid var(--border); padding: 12px 16px; display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
    .input-area input { flex: 1; padding: 12px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 24px; color: var(--text); font-size: 15px; outline: none; }
    .input-area input:focus { border-color: var(--accent); }
    .input-area input::placeholder { color: var(--text2); }
    .send-btn { width: 46px; height: 46px; background: linear-gradient(135deg, var(--accent), #8b5cf6); border: none; border-radius: 50%; color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .send-btn:active { transform: scale(0.9); }

    /* ===== VIDEO CALL ===== */
    #videoCallView {
      position: fixed; inset: 0; background: var(--bg); z-index: 200;
      display: none; flex-direction: column;
    }
    #videoCallView.active { display: flex; }

    .vc-header { padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; background: var(--surface); border-bottom: 1px solid var(--border); }
    .vc-header h2 { font-size: 15px; color: var(--green); display: flex; align-items: center; gap: 8px; }
    .vc-header .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .vc-header .timer { color: var(--text2); font-size: 14px; font-family: monospace; }

    .vc-grid { flex: 1; display: flex; flex-wrap: wrap; gap: 4px; padding: 4px; overflow: hidden; align-content: center; justify-content: center; }
    .vc-tile { position: relative; background: var(--surface2); border-radius: 12px; overflow: hidden; flex: 1 1 calc(50% - 4px); min-height: 200px; display: flex; align-items: center; justify-content: center; }
    .vc-tile video { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
    .vc-tile .label { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.7); padding: 3px 10px; border-radius: 8px; font-size: 12px; }
    .vc-tile.solo { flex: 1 1 100%; min-height: 300px; }
    .vc-tile .avatar { font-size: 48px; }
    .vc-tile.local-tile { flex: 0 0 120px; min-height: 160px; position: fixed; bottom: 100px; right: 12px; z-index: 210; border: 2px solid var(--accent); }

    .vc-controls { padding: 16px; display: flex; justify-content: center; gap: 16px; background: var(--surface); border-top: 1px solid var(--border); }
    .vc-btn { width: 54px; height: 54px; border-radius: 50%; border: none; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s; }
    .vc-btn:active { transform: scale(0.9); }
    .vc-btn.mic { background: var(--surface2); color: var(--text); }
    .vc-btn.mic.off { background: var(--red); color: white; }
    .vc-btn.cam { background: var(--surface2); color: var(--text); }
    .vc-btn.cam.off { background: var(--red); color: white; }
    .vc-btn.end { background: var(--red); color: white; width: 62px; height: 62px; font-size: 26px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Username Modal -->
  <div class="modal-overlay" id="usernameModal">
    <div class="modal">
      <h2>Welcome to Chat 💬</h2>
      <p>Enter your name to start</p>
      <input type="text" id="usernameInput" placeholder="Your name..." maxlength="20" autocomplete="off">
      <button onclick="joinChat()">Join Chat</button>
    </div>
  </div>

  <!-- Main Chat View -->
  <div id="chatView" style="display:flex;flex-direction:column;flex:1;">
    <div class="header">
      <div class="header-icon">💬</div>
      <div class="header-info">
        <h1>Nivas Chat</h1>
        <span>Online</span>
      </div>
      <div class="header-actions">
        <button class="header-btn" onclick="startVideoCall()" title="Start Video Call">📹</button>
      </div>
    </div>
    <div class="users-bar" id="usersBar"></div>
    <div class="messages" id="messages"></div>
    <div class="typing-indicator" id="typingIndicator"></div>
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off" disabled>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
    </div>
  </div>

  <!-- Video Call View -->
  <div id="videoCallView">
    <div class="vc-header">
      <h2><span class="dot"></span> Video Call</h2>
      <span class="timer" id="callTimer">00:00</span>
    </div>
    <div class="vc-grid" id="vcGrid"></div>
    <div class="vc-controls">
      <button class="vc-btn mic" id="micBtn" onclick="toggleMic()">🎤</button>
      <button class="vc-btn cam" id="camBtn" onclick="toggleCam()">📷</button>
      <button class="vc-btn end" onclick="endVideoCall()">📵</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ===== STATE =====
    const socket = io();
    let myUsername = '';
    let localStream = null;
    let peers = {}; // { peerId: { pc, stream, username } }
    let inCall = false;
    let micEnabled = true;
    let camEnabled = true;
    let callSeconds = 0;
    let callTimerInterval = null;

    const rtcConfig = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' }
      ]
    };

    // ===== DOM =====
    const modal = document.getElementById('usernameModal');
    const usernameInput = document.getElementById('usernameInput');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const messagesDiv = document.getElementById('messages');
    const typingIndicator = document.getElementById('typingIndicator');
    const usersBar = document.getElementById('usersBar');
    const videoCallView = document.getElementById('videoCallView');
    const vcGrid = document.getElementById('vcGrid');

    usernameInput.focus();
    usernameInput.addEventListener('keypress', e => { if (e.key === 'Enter') joinChat(); });

    function joinChat() {
      const name = usernameInput.value.trim();
      if (!name) return;
      myUsername = name;
      modal.classList.add('hidden');
      messageInput.disabled = false;
      sendBtn.disabled = false;
      messageInput.focus();
      socket.emit('user_join', myUsername);
    }

    // ===== CHAT =====
    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;
      socket.emit('send_message', { username: myUsername, text });
      messageInput.value = '';
      socket.emit('stop_typing');
    }
    messageInput.addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

    let typingTimeout;
    messageInput.addEventListener('input', () => {
      socket.emit('typing', myUsername);
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => socket.emit('stop_typing'), 1500);
    });

    socket.on('load_messages', msgs => { msgs.forEach(m => appendMsg(m)); scrollBottom(); });
    socket.on('receive_message', msg => { appendMsg(msg); scrollBottom(); });
    socket.on('user_typing', u => { typingIndicator.textContent = u + ' is typing...'; });
    socket.on('user_stop_typing', () => { typingIndicator.textContent = ''; });
    socket.on('users_update', list => {
      usersBar.innerHTML = list.map(u => '<span class="user-pill">' + esc(u) + '</span>').join('');
    });

    function appendMsg(msg) {
      const div = document.createElement('div');
      if (msg.username === 'System') {
        div.className = 'system-msg';
        div.textContent = msg.text;
      } else {
        const isMe = msg.username === myUsername;
        div.className = 'msg ' + (isMe ? 'me' : 'other');
        div.innerHTML = '<div class="username">' + esc(msg.username) + '</div>' +
          '<div class="text">' + esc(msg.text) + '</div>' +
          '<div class="time">' + msg.timestamp + '</div>';
      }
      messagesDiv.appendChild(div);
    }
    function scrollBottom() { messagesDiv.scrollTop = messagesDiv.scrollHeight; }
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // ===== VIDEO CALL =====
    async function startVideoCall() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      } catch (e) {
        alert('Camera/mic access needed! Allow permissions and try again.');
        return;
      }

      inCall = true;
      videoCallView.classList.add('active');
      callSeconds = 0;
      callTimerInterval = setInterval(() => {
        callSeconds++;
        const m = Math.floor(callSeconds / 60).toString().padStart(2, '0');
        const s = (callSeconds % 60).toString().padStart(2, '0');
        document.getElementById('callTimer').textContent = m + ':' + s;
      }, 1000);

      // Add local tile
      renderGrid();
      
      // Join the call room on server
      socket.emit('join_call', { username: myUsername });
    }

    function renderGrid() {
      vcGrid.innerHTML = '';
      
      // Remote peers
      const peerIds = Object.keys(peers);
      if (peerIds.length === 0) {
        // Solo — show local big + waiting message
        const tile = document.createElement('div');
        tile.className = 'vc-tile solo';
        tile.innerHTML = '<div style="text-align:center;color:var(--text2)"><div style="font-size:48px;margin-bottom:12px">📹</div><div>Waiting for others to join...</div><div style="font-size:12px;margin-top:8px">Share the link!</div></div>';
        vcGrid.appendChild(tile);
      } else {
        peerIds.forEach(id => {
          const peer = peers[id];
          const tile = document.createElement('div');
          tile.className = 'vc-tile' + (peerIds.length === 1 ? ' solo' : '');
          if (peer.stream) {
            const vid = document.createElement('video');
            vid.autoplay = true;
            vid.playsinline = true;
            vid.srcObject = peer.stream;
            tile.appendChild(vid);
          } else {
            tile.innerHTML = '<div class="avatar">👤</div>';
          }
          const label = document.createElement('div');
          label.className = 'label';
          label.textContent = peer.username || 'User';
          tile.appendChild(label);
          vcGrid.appendChild(tile);
        });
      }

      // Local tile (small, floating)
      let localTile = document.getElementById('localTile');
      if (!localTile) {
        localTile = document.createElement('div');
        localTile.id = 'localTile';
        localTile.className = 'vc-tile local-tile';
        document.body.appendChild(localTile);
      }
      localTile.innerHTML = '';
      if (localStream) {
        const vid = document.createElement('video');
        vid.autoplay = true;
        vid.playsinline = true;
        vid.muted = true;
        vid.srcObject = localStream;
        localTile.appendChild(vid);
      }
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = 'You';
      localTile.appendChild(label);
      localTile.style.display = 'flex';
    }

    // ===== WebRTC =====
    function createPC(peerId, username) {
      const pc = new RTCPeerConnection(rtcConfig);
      peers[peerId] = { pc, stream: null, username };

      // Add local tracks
      if (localStream) {
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
      }

      pc.ontrack = (e) => {
        peers[peerId].stream = e.streams[0];
        renderGrid();
      };

      pc.onicecandidate = (e) => {
        if (e.candidate) {
          socket.emit('ice_candidate', { to: peerId, candidate: e.candidate });
        }
      };

      pc.onconnectionstatechange = () => {
        if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
          removePeer(peerId);
        }
      };

      return pc;
    }

    function removePeer(peerId) {
      if (peers[peerId]) {
        peers[peerId].pc.close();
        delete peers[peerId];
        renderGrid();
      }
    }

    // When we join and get list of existing participants — we create offers to each
    socket.on('call_participants', async (participantIds) => {
      for (const peerId of participantIds) {
        const pc = createPC(peerId, 'User');
        try {
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          socket.emit('offer', { to: peerId, offer });
        } catch (e) { console.error('Offer error:', e); }
      }
    });

    // When a new peer joins after us — wait for their offer
    socket.on('call_peer_joined', (data) => {
      // We wait for their offer, nothing to do here
      console.log('Peer joined:', data.username);
    });

    // Receive offer
    socket.on('offer', async (data) => {
      let peer = peers[data.from];
      let pc;
      if (peer) {
        pc = peer.pc;
      } else {
        pc = createPC(data.from, 'User');
      }
      try {
        await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        socket.emit('answer', { to: data.from, answer });
      } catch (e) { console.error('Answer error:', e); }
    });

    // Receive answer
    socket.on('answer', async (data) => {
      const peer = peers[data.from];
      if (peer) {
        try {
          await peer.pc.setRemoteDescription(new RTCSessionDescription(data.answer));
        } catch (e) { console.error('Set answer error:', e); }
      }
    });

    // Receive ICE candidate
    socket.on('ice_candidate', async (data) => {
      const peer = peers[data.from];
      if (peer) {
        try {
          await peer.pc.addIceCandidate(new RTCIceCandidate(data.candidate));
        } catch (e) { console.error('ICE error:', e); }
      }
    });

    // Peer left
    socket.on('call_peer_left', (data) => {
      removePeer(data.peerId);
      appendMsg({
        username: 'System',
        text: '📞 ' + (data.username || 'Someone') + ' left the call',
        timestamp: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })
      });
    });

    function toggleMic() {
      micEnabled = !micEnabled;
      if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = micEnabled);
      const btn = document.getElementById('micBtn');
      btn.textContent = micEnabled ? '🎤' : '🔇';
      btn.classList.toggle('off', !micEnabled);
    }

    function toggleCam() {
      camEnabled = !camEnabled;
      if (localStream) localStream.getVideoTracks().forEach(t => t.enabled = camEnabled);
      const btn = document.getElementById('camBtn');
      btn.textContent = camEnabled ? '📷' : '🚫';
      btn.classList.toggle('off', !camEnabled);
    }

    function endVideoCall() {
      // Close all peer connections
      Object.keys(peers).forEach(id => {
        peers[id].pc.close();
        delete peers[id];
      });

      // Stop local stream
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
      }

      // Remove local tile
      const lt = document.getElementById('localTile');
      if (lt) lt.remove();

      // Reset UI
      inCall = false;
      micEnabled = true;
      camEnabled = true;
      document.getElementById('micBtn').textContent = '🎤';
      document.getElementById('micBtn').classList.remove('off');
      document.getElementById('camBtn').textContent = '📷';
      document.getElementById('camBtn').classList.remove('off');
      videoCallView.classList.remove('active');
      vcGrid.innerHTML = '';

      clearInterval(callTimerInterval);
      document.getElementById('callTimer').textContent = '00:00';

      socket.emit('leave_call');

      appendMsg({
        username: 'System',
        text: '📞 You left the call',
        timestamp: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })
      });
    }
  </script>
</body>
</html>
