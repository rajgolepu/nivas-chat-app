<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nivas Chat</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a2e;
      --border: #2a2a3e;
      --text: #e4e4e7;
      --text2: #8888a0;
      --accent: #6c5ce7;
      --accent2: #a29bfe;
      --green: #00cec9;
      --msg-me: #2d1b69;
      --msg-other: #1e1e2e;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ---- Username Modal ---- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    .modal-overlay.hidden { display: none; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      width: 90%;
      max-width: 360px;
      text-align: center;
      animation: popIn 0.3s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .modal h2 {
      font-size: 22px;
      margin-bottom: 6px;
      background: linear-gradient(135deg, var(--accent2), var(--green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .modal p {
      color: var(--text2);
      font-size: 14px;
      margin-bottom: 20px;
    }
    .modal input {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 16px;
      outline: none;
      transition: border 0.2s;
      margin-bottom: 16px;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
    }
    .modal button:active { transform: scale(0.97); }
    .modal button:hover { box-shadow: 0 4px 20px rgba(108,92,231,0.4); }

    /* ---- Header ---- */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .header-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--green));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .header-info h1 {
      font-size: 17px;
      font-weight: 700;
    }
    .header-info span {
      font-size: 12px;
      color: var(--green);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .header-info span::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--green);
      border-radius: 50%;
    }
    .online-count {
      margin-left: auto;
      background: var(--surface2);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      color: var(--text2);
    }

    /* ---- Messages ---- */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 16px;
      animation: fadeUp 0.25s ease;
      word-wrap: break-word;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.me {
      align-self: flex-end;
      background: var(--msg-me);
      border-bottom-right-radius: 4px;
    }
    .msg.other {
      align-self: flex-start;
      background: var(--msg-other);
      border-bottom-left-radius: 4px;
    }
    .msg .username {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent2);
      margin-bottom: 3px;
    }
    .msg.me .username { color: var(--green); }
    .msg .text {
      font-size: 15px;
      line-height: 1.4;
      color: var(--text);
    }
    .msg .time {
      font-size: 10px;
      color: var(--text2);
      margin-top: 4px;
      text-align: right;
    }
    .msg.other .time { text-align: left; }

    .typing-indicator {
      font-size: 13px;
      color: var(--text2);
      padding: 4px 16px;
      min-height: 24px;
      font-style: italic;
    }

    /* ---- Input ---- */
    .input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }
    .input-area input {
      flex: 1;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 24px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }
    .input-area input:focus { border-color: var(--accent); }
    .input-area input::placeholder { color: var(--text2); }

    .send-btn {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s;
      flex-shrink: 0;
    }
    .send-btn:active { transform: scale(0.9); }

    /* ---- System messages ---- */
    .system-msg {
      text-align: center;
      font-size: 12px;
      color: var(--text2);
      padding: 8px;
      background: var(--surface2);
      border-radius: 20px;
      align-self: center;
      max-width: 80%;
    }
  </style>
</head>
<body>

  <!-- Username Modal -->
  <div class="modal-overlay" id="usernameModal">
    <div class="modal">
      <h2>Welcome to Chat 💬</h2>
      <p>Enter your name to start chatting</p>
      <input type="text" id="usernameInput" placeholder="Your name..." maxlength="20" autocomplete="off">
      <button onclick="joinChat()">Join Chat</button>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">💬</div>
    <div class="header-info">
      <h1>Nivas Chat</h1>
      <span>Online</span>
    </div>
    <div class="online-count" id="onlineCount">0 online</div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>
  <div class="typing-indicator" id="typingIndicator"></div>

  <!-- Input -->
  <div class="input-area">
    <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off" disabled>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
      ➤
    </button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let myUsername = '';

    const modal = document.getElementById('usernameModal');
    const usernameInput = document.getElementById('usernameInput');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const messagesDiv = document.getElementById('messages');
    const typingIndicator = document.getElementById('typingIndicator');
    const onlineCount = document.getElementById('onlineCount');

    // Focus username input on load
    usernameInput.focus();

    // Join on Enter key
    usernameInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') joinChat();
    });

    function joinChat() {
      const name = usernameInput.value.trim();
      if (!name) return;
      myUsername = name;
      modal.classList.add('hidden');
      messageInput.disabled = false;
      sendBtn.disabled = false;
      messageInput.focus();
    }

    // Send message
    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;
      socket.emit('send_message', { username: myUsername, text });
      messageInput.value = '';
      socket.emit('stop_typing');
    }

    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Typing indicator
    let typingTimeout;
    messageInput.addEventListener('input', () => {
      socket.emit('typing', myUsername);
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => socket.emit('stop_typing'), 1500);
    });

    // Load existing messages
    socket.on('load_messages', (msgs) => {
      msgs.forEach(msg => appendMessage(msg));
      scrollToBottom();
    });

    // Receive new message
    socket.on('receive_message', (msg) => {
      appendMessage(msg);
      scrollToBottom();
    });

    // Typing events
    socket.on('user_typing', (username) => {
      typingIndicator.textContent = username + ' is typing...';
    });
    socket.on('user_stop_typing', () => {
      typingIndicator.textContent = '';
    });

    function appendMessage(msg) {
      const div = document.createElement('div');
      const isMe = msg.username === myUsername;
      div.className = 'msg ' + (isMe ? 'me' : 'other');
      div.innerHTML = 
        '<div class="username">' + escapeHtml(msg.username) + '</div>' +
        '<div class="text">' + escapeHtml(msg.text) + '</div>' +
        '<div class="time">' + msg.timestamp + '</div>';
      messagesDiv.appendChild(div);
    }

    function scrollToBottom() {
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // Track online users (simple heartbeat)
    socket.on('connect', () => {
      onlineCount.textContent = '🟢 connected';
    });
    socket.on('disconnect', () => {
      onlineCount.textContent = '🔴 disconnected';
    });
  </script>
</body>
</html>
